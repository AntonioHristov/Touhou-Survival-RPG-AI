<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gensokyo Engine - Key-Based Sync</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panels {
            display: flex;
            gap: 20px;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        textarea {
            width: 100%;
            height: 280px;
            background: #2d2d2d;
            color: #a9dc76;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            box-sizing: border-box;
        }

        textarea.dragover {
            border-color: #f1c40f;
            background: #3a3a3a;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #00d2ff;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 15px;
            transition: background 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.99);
        }

        #btnMerge {
            background: #8e44ad;
        }

        #btnMerge:hover {
            background: #9b59b6;
        }

        #btnCopy {
            background: #2980b9;
        }

        #btnCopy:hover {
            background: #3498db;
        }

        #btnExport {
            background: #d35400;
        }

        #btnExport:hover {
            background: #e67e22;
        }

        #btnClear {
            background: #c0392b;
        }

        #btnClear:hover {
            background: #e74c3c;
        }

        pre {
            background: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #444;
            overflow-x: auto;
            color: #f8f8f2;
            max-height: 400px;
        }

        .logs {
            background: #222;
            border-left: 4px solid #f1c40f;
            padding: 12px;
            font-family: monospace;
            font-size: 13px;
            max-height: 350px;
            overflow-y: auto;
            line-height: 1.6;
            border-radius: 4px;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 6px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.02);
        }

        .conflict-row {
            border: 1px dashed #f1c40f;
            background: rgba(241, 196, 15, 0.05);
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
        }

        .conflict-row.loss-alarm {
            border: 2px solid #ec407a;
            background: rgba(236, 64, 122, 0.08);
            box-shadow: 0 0 10px rgba(236, 64, 122, 0.2);
        }

        .conflict-row.truncation-alarm {
            border: 2px solid #ff1744;
            background: rgba(255, 23, 68, 0.07);
            box-shadow: 0 0 10px rgba(255, 23, 68, 0.2);
            animation: pulse-border 2s infinite alternate;
        }

        .conflict-row.lore-alarm {
            border: 2px solid #00e5ff;
            background: rgba(0, 229, 255, 0.08);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        @keyframes pulse-border {
            from {
                border-color: #ff1744;
            }

            to {
                border-color: #ff9100;
            }
        }

        .conflict-actions {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-decision {
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            background: #444;
            color: #ccc;
            border: 1px solid #555;
            cursor: pointer;
            flex: none;
        }

        .btn-decision.active[data-opt="1"] {
            background: #c0392b;
            color: white;
            border-color: #e74c3c;
        }

        .btn-decision.active[data-opt="2"] {
            background: #d35400;
            color: white;
            border-color: #e67e22;
        }

        .btn-decision.active[data-opt="3"] {
            background: #27ae60;
            color: white;
            border-color: #2ecc71;
        }

        .added {
            color: #a9dc76;
            background: rgba(169, 220, 118, 0.15);
            padding: 2px 4px;
            border-radius: 3px;
        }

        .changed {
            color: #f1c40f;
            background: rgba(241, 196, 15, 0.15);
            padding: 2px 4px;
            border-radius: 3px;
        }

        .removed {
            color: #ff6188;
            background: rgba(255, 97, 136, 0.15);
            padding: 2px 4px;
            border-radius: 3px;
            text-decoration: line-through;
        }

        .audit-path {
            color: #00d2ff;
            font-weight: bold;
        }

        .audit-op {
            font-weight: bold;
            text-transform: uppercase;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2a2a2a;
            border: 2px solid #555;
            padding: 20px;
            border-radius: 8px;
            z-index: 1000;
            width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
        }

        .memoria-item {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }

        .memoria-item input {
            flex: 1;
            background: #444;
            color: #fff;
            border: 1px solid #666;
            padding: 4px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Gensokyo Engine - Sincronizador de Datos Avanzado (Auditoría Rectificable)</h2>

        <div class="panels">
            <div class="panel">
                <label for="jsonBase">JSON 1: Estado Maestro Completo (Base)</label>
                <textarea id="jsonBase" placeholder="Arrastra o pega el JSON maestro aquí..."></textarea>
            </div>
            <div class="panel">
                <label for="jsonUpdate">JSON 2: Respuesta de la IA (Actualizaciones / aiActions)</label>
                <textarea id="jsonUpdate"
                    placeholder="Arrastra o pega la respuesta parcial de la IA aquí..."></textarea>
            </div>
        </div>

        <div class="actions">
            <button id="btnMerge" onclick="iniciarProcesoCompleto()">Sincronizar Datos</button>
            <button id="btnCopy" onclick="copiarResultado()">Copiar Resultado</button>
            <button id="btnExport" onclick="exportarArchivo()">Exportar .json</button>
            <button id="btnClear" onclick="limpiarTodo()">Limpiar Todo</button>
        </div>

        <div>
            <h3>Registro de Auditoría Interactivo (Haz clic en las opciones para rectificar)</h3>
            <div id="logsSincronizacion" class="logs">Esperando acción...</div>
        </div>

        <div>
            <h3>Resultado Sincronizado</h3>
            <pre id="resultado">{}</pre>
        </div>

        <div id="zonaAccionesRapidas" style="display:none;">
            <h3>Gestión Rápida de Personajes</h3>
            <div id="listaBotonesChars"></div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay" onclick="cerrarModal()"></div>
    <div id="modalMemorias" class="modal">
        <h3 id="modalTitulo">Memorias de</h3>
        <div id="contenidoMemorias"></div>
        <hr style="border-color:#444;">
        <h4>Añadir Recuerdo</h4>
        <div style="display:flex; gap:10px;">
            <input type="text" id="nuevoRecuerdoTxt"
                style="flex:1; background:#444; color:#fff; border:1px solid #666; padding:6px; border-radius:4px;">
            <button id="btnAnadirMemoria" style="padding:6px 12px; font-size:14px;">Añadir</button>
        </div>
        <br>
        <button onclick="cerrarModal()" style="background:#555; padding:6px 12px; font-size:14px;">Cerrar</button>
    </div>

    <script>
        let isSystemValid = false;
        let mapaConflictos = new Map();

        [document.getElementById('jsonBase'), document.getElementById('jsonUpdate')].forEach(ta => {
            ta.addEventListener('dragover', e => { e.preventDefault(); ta.classList.add('dragover'); });
            ta.addEventListener('dragleave', () => ta.classList.remove('dragover'));
            ta.addEventListener('drop', e => {
                e.preventDefault();
                ta.classList.remove('dragover');
                const archivo = e.dataTransfer.files[0];
                if (archivo) {
                    const lector = new FileReader();
                    lector.onload = evt => ta.value = evt.target.result;
                    lector.readAsText(archivo);
                }
            });
        });

        function getDynamicRoot(obj) {
            if (!obj) return null;
            return obj.dynamicData ? obj.dynamicData : obj;
        }

        function extraerIdsHijas(nodo, listaIds = []) {
            if (!nodo || typeof nodo !== 'object') return listaIds;
            if (nodo.hasOwnProperty('idObj') && typeof nodo.idObj === 'number') {
                listaIds.push(nodo.idObj);
            }
            for (let clave in nodo) {
                if (nodo.hasOwnProperty(clave) && typeof nodo[clave] === 'object') {
                    extraerIdsHijas(nodo[clave], listaIds);
                }
            }
            return listaIds;
        }

        function detectarTruncado(valor) {
            if (typeof valor === 'string') {
                return valor.includes('...');
            }
            if (valor && typeof valor === 'object') {
                for (let k in valor) {
                    if (valor.hasOwnProperty(k)) {
                        if (detectarTruncado(valor[k])) return true;
                    }
                }
            }
            return false;
        }

        // =================================================================
        //  SISTEMA AUXILIAR AUTÓNOMO DEL LIMBO (PROCESADOR FORENSE COMPLETADO)
        // =================================================================
        function asegurarEstructuraLimbo(baseRoot) {
            if (!baseRoot.worldStorage) baseRoot.worldStorage = {};
            if (!baseRoot.worldStorage.SYSTEM_LOST_FOUND) {
                baseRoot.worldStorage.SYSTEM_LOST_FOUND = {
                    name: "Contenedor Global del Limbo",
                    desc: "Espacio seguro del sistema para objetos huérfanos o desterrados.",
                    subAreas: {}
                };
            }
            const limboRoot = baseRoot.worldStorage.SYSTEM_LOST_FOUND;
            if (!limboRoot.subAreas) limboRoot.subAreas = {};

            if (!limboRoot.subAreas.Contenedor_Global || Array.isArray(limboRoot.subAreas.Contenedor_Global)) {
                limboRoot.subAreas.Contenedor_Global = { items: [] };
            }
            if (!limboRoot.subAreas.Contenedor_Global.items) {
                limboRoot.subAreas.Contenedor_Global.items = [];
            }
            return limboRoot.subAreas.Contenedor_Global.items;
        }

        function deducirLastSeenDeRuta(pathArr, baseRoot) {
            if (!Array.isArray(pathArr) || pathArr.length === 0) {
                return { type: "subArea", id: "Gensokyo" };
            }

            // 1. ANÁLISIS PROFUNDO INTERNO DE CONTENEDORES (TU REQUERIMIENTO)
            // Recorremos los nodos de la ruta de arriba a abajo evaluando si descendemos de un contenedor intermedio
            let current = baseRoot;
            let ultimoIdObjContenedor = null;

            for (let i = 0; i < pathArr.length - 1; i++) {
                if (current && typeof current === 'object') {
                    current = current[pathArr[i]];
                    // Si el nodo actual tiene una idObj válida y no es el objeto final que estamos enviando al limbo, es su padre directo
                    if (current && typeof current === 'object' && current.hasOwnProperty('idObj') && current.idObj !== undefined) {
                        ultimoIdObjContenedor = current.idObj;
                    }
                }
            }

            // Si hallamos que el objeto estaba metido dentro de otro objeto (mochila, cofre, etc.) devolvemos 'object' obligatoriamente
            if (ultimoIdObjContenedor !== null) {
                return { type: "object", id: String(ultimoIdObjContenedor) };
            }

            // 2. CASO RAÍZ DE PERSONAJES (Si no estaba dentro de un sub-contenedor de ítems)
            if (pathArr[0] === "chars" && pathArr[1]) {
                return { type: "char", id: String(pathArr[1]) };
            }

            // 3. CASO RAÍZ DE WORLDSTORAGE (Objetos directamente en el suelo)
            if (pathArr[0] === "worldStorage" && pathArr.length > 1) {
                if (pathArr[1] && pathArr[1] !== "SYSTEM_LOST_FOUND") {
                    const idxSubAreas = pathArr.indexOf("subAreas");
                    if (idxSubAreas !== -1 && pathArr[idxSubAreas + 1]) {
                        return { type: "subArea", id: String(pathArr[idxSubAreas + 1]) };
                    }
                    return { type: "subArea", id: String(pathArr[1]) };
                }
            }

            // Fallback por si la ruta no coincide con nada conocido
            if (baseRoot.worldState && baseRoot.worldState.turnActionPlayer_id) {
                const pId = baseRoot.worldState.turnActionPlayer_id;
                if (baseRoot.chars && baseRoot.chars[pId]) {
                    const areaActual = baseRoot.chars[pId].currentSubArea_id || baseRoot.chars[pId].currentMiniArea_id || "Gensokyo";
                    return { type: "subArea", id: String(areaActual) };
                }
            }
            return { type: "subArea", id: "Gensokyo" };
        }

        function escanearYDesterrarAlLimbo(nodoPadre, rutaActualArray, baseRoot, registroLogs) {
            if (!nodoPadre || typeof nodoPadre !== 'object') return;

            if (Array.isArray(nodoPadre)) {
                for (let i = nodoPadre.length - 1; i >= 0; i--) {
                    const elemento = nodoPadre[i];
                    if (elemento && typeof elemento === 'object') {
                        const rutaElemento = [...rutaActualArray, i];

                        if (elemento.inLimbo === true) {
                            const arrayLimboFinal = asegurarEstructuraLimbo(baseRoot);
                            const existeYa = arrayLimboFinal.some(it => it && it.idObj === elemento.idObj);

                            if (!existeYa) {
                                // Aquí se llama a la lógica corregida que deduce si viene de un char, un sub-objeto o una subArea
                                if (!elemento.last_seen) {
                                    elemento.last_seen = deducirLastSeenDeRuta(rutaElemento, baseRoot);
                                }

                                const objetoDesterrado = nodoPadre.splice(i, 1)[0];
                                arrayLimboFinal.push(objetoDesterrado);

                                registroLogs.push(`
                                    <div class="log-entry" style="border-left: 4px solid #9b59b6; background: rgba(155, 89, 182, 0.1); padding: 6px;">
                                        🌌 <strong>[SISTEMA LIMBO AUTOMÁTICO]</strong> Objeto detectado con flag <code>inLimbo: true</code>.<br>
                                        📦 <strong>Objeto:</strong> <code>"${objetoDesterrado.n || 'Desconocido'}" (ID: ${objetoDesterrado.idObj})</code> desterrado al Limbo.<br>
                                        📍 <strong>last_seen resuelto:</strong> [${objetoDesterrado.last_seen.type} -> ID: ${objetoDesterrado.last_seen.id}]
                                    </div>
                                `);
                            } else {
                                nodoPadre.splice(i, 1);
                            }
                        } else {
                            escanearYDesterrarAlLimbo(elemento, rutaElemento, baseRoot, registroLogs);
                        }
                    }
                }
            } else {
                for (let llave in nodoPadre) {
                    if (nodoPadre.hasOwnProperty(llave) && llave !== 'SYSTEM_LOST_FOUND' && typeof nodoPadre[llave] === 'object') {
                        escanearYDesterrarAlLimbo(nodoPadre[llave], [...rutaActualArray, llave], baseRoot, registroLogs);
                    }
                }
            }
        }

        // =================================================================
        //  GUARDIÁN DE CONTROL INTERACTIVO Y AUDITORÍA RECTIFICABLE
        // =================================================================
        function evaluarYRegistrarCambio(baseRoot, pathArr, nuevoValor, tipoFase, registroLogs) {
            const stringPath = pathArr.join('.');
            const valorOriginal = getValueByPath(baseRoot, pathArr);
            const tipoOriginal = typeof valorOriginal;
            let tipoNuevo = typeof nuevoValor;

            // =================================================================
            // 🔥 NUEVO: INTERCEPTOR RADAR PARA CAPTURAR CUALQUIER ALTERACIÓN
            // =================================================================
            if (pathArr.length >= 2 && pathArr[0] === 'chars') {
                const charId = pathArr[1];
                if (charId && typeof charId === 'string' && charId !== 'id_tplMANDATORY' && window.personajesManipulados) {
                    window.personajesManipulados.add(charId);
                }
            }
            // =================================================================

            // Si el original era número y la IA envía un string numérico, lo sanamos automáticamente
            if (tipoOriginal === 'number' && tipoNuevo === 'string' && !isNaN(nuevoValor) && nuevoValor.trim() !== '') {
                nuevoValor = Number(nuevoValor);
                tipoNuevo = 'number';
            }

            // Si a pesar de la sanación los tipos siguen sin coincidir (y el original no era null/undefined)
            if (valorOriginal !== null && valorOriginal !== undefined && tipoOriginal !== tipoNuevo) {
                const conflictoKey = `${tipoFase}_TYPE_MUTATION_${stringPath}`;
                if (!mapaConflictos.has(conflictoKey)) mapaConflictos.set(conflictoKey, "1"); // Opción 1 por defecto: Mantener Original
                const opcionElegida = mapaConflictos.get(conflictoKey);

                registroLogs.push(`
            <div class="conflict-row loss-alarm">
                ⚠️ <strong>[CAMBIO DE TIPO DE DATO DETECTADO]</strong><br>
                La IA intenta cambiar el tipo de <span class="audit-path">"${stringPath}"</span> de <code>${tipoOriginal}</code> a <code>${tipoNuevo}</code>.<br>
                ❌ Original: <code>${JSON.stringify(valorOriginal)}</code> | 👉 Propuesto: <code>${JSON.stringify(nuevoValor)}</code>
                <div class="conflict-actions">
                    <button class="btn-decision ${opcionElegida === '1' ? 'active' : ''}" data-opt="1" onclick="cambiarDecision('${conflictoKey}', '1')">❌ Mantener Seguro (Original)</button>
                    <button class="btn-decision ${opcionElegida === '2' ? 'active' : ''}" data-opt="2" onclick="cambiarDecision('${conflictoKey}', '2')">⚠️ Aceptar Cambio de Tipo (Peligroso)</button>
                </div>
            </div>
        `);
                return { aprobado: (opcionElegida === "2"), value: nuevoValor };
            }

            if (detectarTruncado(nuevoValor)) {
                const conflictoKey = `${tipoFase}_TRUNC_${stringPath}`;
                if (!mapaConflictos.has(conflictoKey)) mapaConflictos.set(conflictoKey, "1");
                const opcionElegida = mapaConflictos.get(conflictoKey);

                registroLogs.push(`
            <div class="conflict-row truncation-alarm">
                🛑 <strong>[ALERTA CRÍTICA: TRUNCADO DETECTADO]</strong><br>
                La IA intentó enviar texto incompleto <code>"..."</code> en la ruta: <span class="audit-path">"${stringPath}"</span>.<br>
                <div class="conflict-actions">
                    <button class="btn-decision ${opcionElegida === '1' ? 'active' : ''}" data-opt="1" onclick="cambiarDecision('${conflictoKey}', '1')">❌ Mantener Seguro (Rechazar Cambio IA)</button>
                    <button class="btn-decision ${opcionElegida === '2' ? 'active' : ''}" data-opt="2" onclick="cambiarDecision('${conflictoKey}', '2')">⚠️ Forzar Pérdida (Aceptar Valor Truncado)</button>
                </div>
            </div>
        `);
                return { aprobado: (opcionElegida !== "1"), value: nuevoValor };
            }

            // =========================================================================
            // 🔥 NUEVO BLOQUE OPTIMIZADO: CORTAFUEGOS DE CONCIENCIA (MEMORIES)
            // =========================================================================
            const esRaizMemories = stringPath.endsWith('.memories');
            const esIndiceMemories = pathArr.includes('memories') && !isNaN(pathArr[pathArr.length - 1]);

            if (esRaizMemories || esIndiceMemories) {
                // Obtenemos los nombres del personaje afectado de forma dinámica para los textos
                const idxMemories = pathArr.indexOf('memories');
                const charId = idxMemories > 0 ? pathArr[idxMemories - 1] : "Personaje Desconocido";
                const nombreChar = (baseRoot.chars && baseRoot.chars[charId]) ? (baseRoot.chars[charId].nick || charId) : charId;

                // REGLA 1: Intento de eliminar o vaciar el nodo "memories" por completo
                if (esRaizMemories && (nuevoValor === null || nuevoValor === undefined)) {
                    const conflictoKey = `${tipoFase}_DELETE_MEMORIES_${stringPath}`;
                    if (!mapaConflictos.has(conflictoKey)) mapaConflictos.set(conflictoKey, "1"); // Opción 1: Rechazar por defecto
                    const opcionElegida = mapaConflictos.get(conflictoKey);

                    registroLogs.push(`
                <div class="conflict-row loss-alarm" style="border: 2px solid #ff1744; background: rgba(255, 23, 68, 0.1);">
                    🛑 <strong>[INTENTO DE AMNESIA FORZADA DETECTADO]</strong><br>
                    La IA está intentando ELIMINAR por completo el historial de recuerdos de <strong>"${nombreChar}"</strong>.<br>
                    <div class="conflict-actions" style="margin-top: 8px;">
                        <button class="btn-decision ${opcionElegida === '1' ? 'active' : ''}" data-opt="1" onclick="cambiarDecision('${conflictoKey}', '1')">❌ Bloquear Borrado (Mantener Recuerdos Seguros)</button>
                        <button class="btn-decision ${opcionElegida === '2' ? 'active' : ''}" data-opt="2" onclick="cambiarDecision('${conflictoKey}', '2')">⚠️ Permitir Amnesia Total (Peligroso)</button>
                    </div>
                </div>
            `);
                    return { aprobado: (opcionElegida === "2"), value: (opcionElegida === "2" ? nuevoValor : valorOriginal) };
                }

                // REGLA 2: Es una adición limpia y legítima enviada desde la Fase 1 Quirúrgica
                if (tipoFase === "aiActions(MemoryAdd)") {
                    return { aprobado: true, value: nuevoValor }; // Pasa de largo automáticamente sin alertas interactivas
                }

                // REGLA 3: Intento de sobrescritura, alteración del pasado o reordenamiento estructural
                // Solo se activa si el stringificado de datos es realmente diferente (para evitar falsas alertas)
                if (JSON.stringify(valorOriginal) !== JSON.stringify(nuevoValor)) {
                    const conflictoKey = `${tipoFase}_REPLACE_MEMORIES_${stringPath}`;
                    if (!mapaConflictos.has(conflictoKey)) mapaConflictos.set(conflictoKey, "1"); // Opción 1: Rechazar por defecto
                    const opcionElegida = mapaConflictos.get(conflictoKey);

                    let mensajeAlerta = esRaizMemories ?
                        `La IA propone sobrescribir o alterar la lista completa de recuerdos de <strong>"${nombreChar}"</strong>.` :
                        `La IA intenta modificar el recuerdo del índice [${pathArr[pathArr.length - 1]}] de <strong>"${nombreChar}"</strong>.<br>❌ Antes: <code>${JSON.stringify(valorOriginal)}</code><br>👉 Propuesto: <code>"${nuevoValor}"</code>`;

                    registroLogs.push(`
                <div class="conflict-row lore-alarm" style="border-left: 4px solid #b388ff; background: rgba(179, 136, 255, 0.08);">
                    🔮 <strong>[BLOQUEO DE MEMORIAS INTERCEPTADO]</strong><br>
                    ${mensajeAlerta}<br>
                    <div class="conflict-actions" style="margin-top: 8px;">
                        <button class="btn-decision ${opcionElegida === '1' ? 'active' : ''}" data-opt="1" onclick="cambiarDecision('${conflictoKey}', '1')">❌ Mantener Recuerdos Originales (Seguro)</button>
                        <button class="btn-decision ${opcionElegida === '2' ? 'active' : ''}" data-opt="2" onclick="cambiarDecision('${conflictoKey}', '2')">⚠️ Autorizar Modificación de la IA</button>
                    </div>
                </div>
            `);
                    return { aprobado: (opcionElegida === "2"), value: (opcionElegida === "2" ? nuevoValor : valorOriginal) };
                }
            }

            if (Array.isArray(valorOriginal) && Array.isArray(nuevoValor)) {
                const idsOriginales = extraerIdsHijas(valorOriginal);
                const idsNuevas = extraerIdsHijas(nuevoValor);
                const idsPerdidas = idsOriginales.filter(id => !idsNuevas.includes(id));

                if (idsPerdidas.length > 0) {
                    const conflictoKey = `${tipoFase}_LOSS_${stringPath}`;
                    if (!mapaConflictos.has(conflictoKey)) mapaConflictos.set(conflictoKey, "1");
                    const opcionElegida = mapaConflictos.get(conflictoKey);

                    const detallesPerdidos = idsPerdidas.map(id => {
                        const findObj = (arr) => {
                            for (let x of arr) {
                                if (x && x.idObj === id) return x.n || `Objeto ID ${id}`;
                                if (x && x.items && Array.isArray(x.items)) {
                                    let sub = findObj(x.items); if (sub) return sub;
                                }
                            }
                            return `Objeto ID ${id}`;
                        };
                        return `<code>"${findObj(valorOriginal)}"</code> (ID: ${id})`;
                    }).join(", ");

                    registroLogs.push(`
                <div class="conflict-row loss-alarm">
                    🚨 <strong>[ALERTA DE SEGURIDAD: OMISIÓN DE OBJETOS]</strong><br>
                    La IA omitió los siguientes objetos existentes en <span class="audit-path">"${stringPath}"</span>: ${detallesPerdidos}.<br>
                    <div class="conflict-actions">
                        <button class="btn-decision ${opcionElegida === '1' ? 'active' : ''}" data-opt="1" onclick="cambiarDecision('${conflictoKey}', '1')">❌ Proteger Todo (Rechazar Cambio)</button>
                        <button class="btn-decision ${opcionElegida === '2' ? 'active' : ''}" data-opt="2" onclick="cambiarDecision('${conflictoKey}', '2')">⚠️ Forzar Borrado (Aceptar pérdida)</button>
                        <button class="btn-decision ${opcionElegida === '3' ? 'active' : ''}" data-opt="3" onclick="cambiarDecision('${conflictoKey}', '3')">🛡️ Conciliar Realidades (Actualizar + Recuperar)</button>
                    </div>
                </div>
            `);

                    if (opcionElegida === "1") return { aprobado: false, value: null };
                    if (opcionElegida === "2") return { aprobado: true, value: nuevoValor };
                    if (opcionElegida === "3") {
                        let copiaConciliada = JSON.parse(JSON.stringify(nuevoValor));
                        const obtenerObjetoPorId = (arr, targetId) => {
                            for (let item of arr) {
                                if (item && item.idObj === targetId) return item;
                                if (item && item.items && Array.isArray(item.items)) {
                                    let sub = obtenerObjetoPorId(item.items, targetId); if (sub) return sub;
                                }
                            }
                            return null;
                        };
                        idsPerdidas.forEach(id => {
                            const objOriginal = obtenerObjetoPorId(valorOriginal, id);
                            if (objOriginal) copiaConciliada.unshift(JSON.parse(JSON.stringify(objOriginal)));
                        });
                        return { aprobado: true, value: copiaConciliada };
                    }
                }
            }

            // VALIDACIÓN MECÁNICA: Ubicación inexistente para personajes
            if (stringPath.endsWith('current_location') && typeof nuevoValor === 'string') {
                const mapaExiste = existeUbicacionEnMapa(baseRoot.worldStorage || {}, nuevoValor);

                if (!mapaExiste) {
                    const conflictoKey = `${tipoFase}_INVALID_LOC_${stringPath}`;
                    if (!mapaConflictos.has(conflictoKey)) mapaConflictos.set(conflictoKey, "1"); // Opción 1 por defecto: Rechazar
                    const opcionElegida = mapaConflictos.get(conflictoKey);

                    registroLogs.push(`
                <div class="conflict-row loss-alarm" style="border-left: 4px solid #ff5555; background: rgba(255,85,85,0.08);">
                    ⚠️ <strong>[ALERTA DE CONSISTENCIA ESPACIAL]</strong><br>
                    La IA intenta mover al personaje a una ubicación no registrada: <code style="background:#222; color:#ff5555;">"${nuevoValor}"</code>.<br>
                    ❌ Ubicación Original: <code>"${valorOriginal}"</code> | 👉 Propuesta: <code>"${nuevoValor}"</code>
                    <div class="conflict-actions" style="margin-top: 8px;">
                        <button class="btn-decision ${opcionElegida === '1' ? 'active' : ''}" data-opt="1" onclick="cambiarDecision('${conflictoKey}', '1')">❌ Rechazar (Mantener Ubicación Segura)</button>
                        <button class="btn-decision ${opcionElegida === '2' ? 'active' : ''}" data-opt="2" onclick="cambiarDecision('${conflictoKey}', '2')">⚠️ Forzar Ubicación (Crear Vacío Narrativo)</button>
                    </div>
                </div>
            `);

                    return {
                        aprobado: (opcionElegida === "2"),
                        value: (opcionElegida === "2" ? nuevoValor : valorOriginal)
                    };
                }
            }

            if (pathArr.length >= 4 && pathArr[0] === 'chars' && pathArr[3] === 0) {
                const charId = pathArr[1];
                const statKey = pathArr[2];
                if (baseRoot.chars && baseRoot.chars[charId] && Array.isArray(baseRoot.chars[charId][statKey])) {
                    const statArray = baseRoot.chars[charId][statKey];
                    const maxValor = statArray[1] !== undefined ? statArray[1] : Infinity;
                    if (typeof nuevoValor === 'number' && (nuevoValor < 0 || nuevoValor > maxValor)) {
                        let valorReparado = nuevoValor < 0 ? 0 : maxValor;
                        const conflictoKey = `${tipoFase}_STAT_${stringPath}`;
                        if (!mapaConflictos.has(conflictoKey)) mapaConflictos.set(conflictoKey, "1");
                        const opcionElegida = mapaConflictos.get(conflictoKey);

                        registroLogs.push(`
                    <div class="conflict-row">
                        ⚠️ <strong>[DESBORDAMIENTO EN STAT]</strong> Valor fuera de rango para <code>${statKey}</code> de <strong>${charId}</strong>.
                        <div class="conflict-actions">
                            <button class="btn-decision ${opcionElegida === '1' ? 'active' : ''}" data-opt="1" onclick="cambiarDecision('${conflictoKey}', '1')">1 - Rechazar Cambio</button>
                            <button class="btn-decision ${opcionElegida === '2' ? 'active' : ''}" data-opt="2" onclick="cambiarDecision('${conflictoKey}', '2')">2 - Forzar Valor IA</button>
                            <button class="btn-decision ${opcionElegida === '3' ? 'active' : ''}" data-opt="3" onclick="cambiarDecision('${conflictoKey}', '3')">3 - Reparar a Límite (${valorReparado})</button>
                        </div>
                    </div>
                `);
                        if (opcionElegida === "1") return { aprobado: false, value: null };
                        if (opcionElegida === "2") return { aprobado: true, value: nuevoValor };
                        if (opcionElegida === "3") return { aprobado: true, value: valorReparado };
                    }
                }
            }

            return { aprobado: true, value: nuevoValor };
        }

        function cambiarDecision(conflictoKey, nuevaOpcion) {
            mapaConflictos.set(conflictoKey, nuevaOpcion);
            ejecutarSincronizacionProcesada();
        }

        function iniciarProcesoCompleto() {
            mapaConflictos.clear();
            ejecutarSincronizacionProcesada();
        }

        function processAiActions(base, update, logs) {
            const baseRoot = getDynamicRoot(base);
            const updateRoot = getDynamicRoot(update);

            if (!updateRoot || !updateRoot.aiActions) {
                logs.push("<div class='log-entry'>No se detectó 'aiActions'. Omitiendo fase transaccional.</div>");
                return;
            }

            const actions = updateRoot.aiActions;
            if (actions.why) logs.push(`<div class='log-entry'><strong>Justificación IA:</strong> <em>${actions.why}</em></div>`);

            const implicadosEnTurno = new Set();
            if (baseRoot.worldState && baseRoot.worldState.turnActionPlayer_id) implicadosEnTurno.add(baseRoot.worldState.turnActionPlayer_id);

            if (!baseRoot.worldState) baseRoot.worldState = {};
            if (!Array.isArray(baseRoot.worldState.reusableObjIds)) baseRoot.worldState.reusableObjIds = [];

            if (Array.isArray(actions.sequence)) {
                actions.sequence.forEach((action, index) => {
                    const paso = `<strong>[Paso ${index + 1}]</strong>`;

                    switch (action.op) {
                        case "delete":
                            if (action.targetId !== undefined) {
                                const localizacion = encontrarRutaYPadrePorId(baseRoot, action.targetId);
                                if (localizacion) {
                                    const { padre, clave, objeto } = localizacion;
                                    extraerIdsHijas(objeto).forEach(id => {
                                        if (!baseRoot.worldState.reusableObjIds.includes(id)) baseRoot.worldState.reusableObjIds.push(id);
                                    });
                                    baseRoot.worldState.reusableObjIds.sort((a, b) => a - b);

                                    padre.splice(clave, 1);
                                    logs.push(`<div class='log-entry'>${paso} <span class='removed audit-op'>[DELETE BY ID]</span> Objeto "${objeto.n}" (ID: ${action.targetId}) removido con éxito.</div>`);
                                } else {
                                    logs.push(`<div class='log-entry' style='color:#ff6188;'>${paso} ⚠️ Intentó borrar ID ${action.targetId} pero no se encontró en el mundo.</div>`);
                                }
                            } else if (action.id !== undefined) {
                                const hallado = findAndExtractObjId(baseRoot, action.id);
                                if (hallado) {
                                    extraerIdsHijas(hallado).forEach(id => {
                                        if (!baseRoot.worldState.reusableObjIds.includes(id)) baseRoot.worldState.reusableObjIds.push(id);
                                    });
                                    baseRoot.worldState.reusableObjIds.sort((a, b) => a - b);
                                    logs.push(`<div class='log-entry'>${paso} <span class='removed audit-op'>[DELETE]</span> Objeto ID ${action.id} removido.</div>`);
                                }
                            } else if (Array.isArray(action.path)) {
                                // 1. Capturamos el valor completo del nodo antes de borrarlo
                                const valorAntiguo = getValueByPath(baseRoot, action.path);

                                if (valorAntiguo !== null && valorAntiguo !== undefined) {
                                    // Extraemos e indexamos las IDs hijas para el sistema de reciclaje
                                    const idsHijas = extraerIdsHijas(valorAntiguo);
                                    idsHijas.forEach(id => {
                                        if (!baseRoot.worldState.reusableObjIds.includes(id)) baseRoot.worldState.reusableObjIds.push(id);
                                    });
                                    baseRoot.worldState.reusableObjIds.sort((a, b) => a - b);

                                    // --- SOLUCIÓN: STRINGIFICACIÓN ESTRUCTURAL COMPLETA ---
                                    // Convertimos todo el fragmento borrado en texto JSON formateado
                                    const jsonEstructuraDestruida = JSON.stringify(valorAntiguo, null, 4);

                                    // 2. Ejecutamos el borrado físico en el JSON maestro
                                    if (deleteByPath(baseRoot, action.path)) {
                                        logs.push(`
                    <div class='log-entry'>
                        ${paso} <span class='removed audit-op'>[DELETE]</span> Nodo en <span class='audit-path'>${JSON.stringify(action.path)}</span> eliminado de la existencia.
                        <div style="margin-top: 8px; border-left: 3px solid #ff6188; padding-left: 10px;">
                            <span style="font-size: 12px; color: #ff6188; font-weight: bold; display: block; margin-bottom: 4px;">☢️ ESTRUCTURA COMPLETA ELIMINADA (DATOS ORIGINALES):</span>
                            <pre style="background: #111; color: #ff6188; border: 1px solid #333; font-size: 12px; max-height: 250px; overflow-y: auto; margin: 0; padding: 10px; line-height: 1.4;">${escapeHtml(jsonEstructuraDestruida)}</pre>
                        </div>
                    </div>
                `);
                                    }
                                } else {
                                    logs.push(`<div class='log-entry' style='color:#ff6188;'>${paso} ⚠️ Intentó borrar la ruta <span class='audit-path'>${JSON.stringify(action.path)}</span> pero ya no existía.</div>`);
                                }
                            }
                            break;

                        case "editObj":
                            // NUEVA OPERACIÓN: Permite editar propiedades de un objeto directamente por su ID
                            if (action.targetId !== undefined && action.updates) {
                                const localizacion = encontrarRutaYPadrePorId(baseRoot, action.targetId);
                                if (localizacion) {
                                    const { objeto, ruta } = localizacion;

                                    // Recorremos las actualizaciones que pide la IA (ej: modificar "det" o "q")
                                    for (let prop in action.updates) {
                                        if (action.updates.hasOwnProperty(prop)) {
                                            const rutaPropiedad = [...ruta, prop];
                                            const valorAntiguo = objeto[prop];
                                            const nuevoValor = action.updates[prop];

                                            // Evaluamos mediante tu sistema de seguridad reactivo
                                            const decision = evaluarYRegistrarCambio(baseRoot, rutaPropiedad, nuevoValor, "aiActions(editObj)", logs);
                                            if (!decision.aprobado) continue;

                                            objeto[prop] = decision.value;
                                            logs.push(`<div class='log-entry'>${paso} <span class='changed audit-op'>[EDIT OBJ]</span> Objeto ID ${action.targetId} ("${objeto.n}"). Propiedad <code>"${prop}"</code> actualizada.</div>`);
                                        }
                                    }
                                } else {
                                    logs.push(`<div class='log-entry' style='color:#ff6188;'>${paso} ⚠️ Intentó editar objeto ID ${action.targetId} pero no existe.</div>`);
                                }
                            }
                            break;

                        case "move":
                            // Soportamos tanto 'targetId' (nuevo estándar) como 'id' (retrocompatibilidad)
                            const idAMover = action.targetId !== undefined ? action.targetId : action.id;

                            if (idAMover !== undefined && Array.isArray(action.to)) {
                                const destino = getValueByPath(baseRoot, action.to);
                                if (!destino) {
                                    logs.push(`<div class='log-entry' style='color:#ff6188;'>${paso} ⚠️ Destino inaccesible para mover el objeto ID ${idAMover}.</div>`);
                                    break;
                                }

                                // 1. Buscamos el objeto para clonar sus datos ANTES de que 'findAndExtractObjId' lo extirpe de su sitio
                                // Nota: Si tienes una función específica para buscar sin borrar úsala, si no, podemos usar un truco intermedio.
                                // Asumiendo que findAndExtractObjId extrae el objeto, lo guardamos en una variable.
                                const objetoMovido = findAndExtractObjId(baseRoot, idAMover);

                                if (objetoMovido) {
                                    // Evaluamos el cambio antes de insertarlo en el destino para activar tus alertas de seguridad
                                    const decisionMove = evaluarYRegistrarCambio(baseRoot, action.to, objetoMovido, "aiActions(Move)", logs);
                                    if (!decisionMove.aprobado) {
                                        // Si el usuario o el sistema lo rechaza, lo devolvemos a donde estaba (o evitamos perderlo)
                                        // (Dependiendo de tu arquitectura, aquí podrías reinsertarlo, pero si está aprobado seguimos:)
                                    }

                                    // Stringificamos el objeto aislado que se va a mover
                                    const jsonObjetoMovido = JSON.stringify(objetoMovido, null, 4);
                                    const detalleMovimiento = `
                <div style="margin-top: 8px; border-left: 3px solid #78dce8; padding-left: 10px;">
                    <span style="font-size: 12px; color: #78dce8; font-weight: bold; display: block; margin-bottom: 4px;">📦 OBJETO EN TRÁNSITO (DATOS TRANSFERIDOS):</span>
                    <pre style="background: #111; color: #78dce8; border: 1px solid #333; font-size: 12px; max-height: 200px; overflow-y: auto; margin: 0; padding: 10px; line-height: 1.4;">${escapeHtml(jsonObjetoMovido)}</pre>
                </div>
            `;

                                    // 2. Insertamos el objeto en el array o contenedor de destino
                                    if (Array.isArray(destino)) {
                                        destino.push(objetoMovido);
                                    } else if (action.key) {
                                        destino[action.key] = objetoMovido;
                                    }

                                    logs.push(`
                <div class='log-entry'>
                    ${paso} <span class='changed audit-op' style='background: #78dce8; color: #111;'>[MOVE]</span> Objeto ID ${idAMover} movido con éxito a <span class='audit-path'>${JSON.stringify(action.to)}</span>
                    ${detalleMovimiento}
                </div>
            `);
                                } else {
                                    logs.push(`<div class='log-entry' style='color:#ff6188;'>${paso} ⚠️ No se pudo mover el objeto ID ${idAMover} porque no se encontró en ninguna parte del mundo.</div>`);
                                }
                            }
                            break;

                        case "create":
                            if (Array.isArray(action.to) && action.data) {
                                const targetContainer = getValueByPath(baseRoot, action.to);
                                if (!targetContainer) break;
                                let freshData = JSON.parse(JSON.stringify(action.data));

                                const decisionCreate = evaluarYRegistrarCambio(baseRoot, action.to, freshData, "aiActions(Create)", logs);
                                if (!decisionCreate.aprobado) break;
                                freshData = decisionCreate.value;

                                // Preparamos la visualización del JSON que se va a inyectar
                                const jsonEstructuraCreada = JSON.stringify(freshData, null, 4);
                                let detalleInyeccion = `
            <div style="margin-top: 8px; border-left: 3px solid #a9dc76; padding-left: 10px;">
                <span style="font-size: 12px; color: #a9dc76; font-weight: bold; display: block; margin-bottom: 4px;">✨ ESTRUCTURA INYECTADA (DATOS NUEVOS):</span>
                <pre style="background: #111; color: #a9dc76; border: 1px solid #333; font-size: 12px; max-height: 250px; overflow-y: auto; margin: 0; padding: 10px; line-height: 1.4;">${escapeHtml(jsonEstructuraCreada)}</pre>
            </div>
        `;

                                if (action.isObj === true) {
                                    let assignedId = baseRoot.worldState.reusableObjIds.length > 0 ? baseRoot.worldState.reusableObjIds.shift() : ((baseRoot.worldState.lastGeneratedObjId || 0) + 1);
                                    if (!baseRoot.worldState.reusableObjIds.length) baseRoot.worldState.lastGeneratedObjId = assignedId;

                                    // Le asignamos la ID al objeto real
                                    freshData.idObj = assignedId;

                                    // Volvemos a stringificar para que el recuadro del log muestre la ID asignada en tiempo real
                                    const jsonConId = JSON.stringify(freshData, null, 4);
                                    detalleInyeccion = `
                <div style="margin-top: 8px; border-left: 3px solid #a9dc76; padding-left: 10px;">
                    <span style="font-size: 12px; color: #a9dc76; font-weight: bold; display: block; margin-bottom: 4px;">✨ OBJETO CONFIGURADO DE FORMA DINÁMICA:</span>
                    <pre style="background: #111; color: #a9dc76; border: 1px solid #333; font-size: 12px; max-height: 250px; overflow-y: auto; margin: 0; padding: 10px; line-height: 1.4;">${escapeHtml(jsonConId)}</pre>
                </div>
            `;

                                    if (Array.isArray(targetContainer)) targetContainer.push(freshData);

                                    logs.push(`
                <div class='log-entry'>
                    ${paso} <span class='added audit-op'>[CREATE]</span> Objeto ID ${assignedId} en <span class='audit-path'>${JSON.stringify(action.to)}</span>
                    ${detalleInyeccion}
                </div>
            `);
                                } else if (action.key) {
                                    targetContainer[action.key] = freshData;
                                    logs.push(`
                <div class='log-entry'>
                    ${paso} <span class='added audit-op'>[CREATE]</span> Propiedad <span class='audit-path'>"${action.key}"</span> creada en <span class='audit-path'>${JSON.stringify(action.to)}</span>.
                    ${detalleInyeccion}
                </div>
            `);
                                } else if (Array.isArray(targetContainer)) {
                                    targetContainer.push(freshData);
                                    logs.push(`
                <div class='log-entry'>
                    ${paso} <span class='added audit-op'>[CREATE]</span> Añadido en array de <span class='audit-path'>${JSON.stringify(action.to)}</span>.
                    ${detalleInyeccion}
                </div>
            `);
                                }
                            }
                            break;

                        case "edit":
                            if (Array.isArray(action.path) && action.value !== undefined) {
                                const valorAntiguo = getValueByPath(baseRoot, action.path);
                                const decision = evaluarYRegistrarCambio(baseRoot, action.path, action.value, "aiActions(Edit)", logs);
                                if (!decision.aprobado) break;

                                if (setValueByPath(baseRoot, action.path, decision.value)) {
                                    logs.push(`<div class='log-entry'>${paso} <span class='changed audit-op'>[EDIT]</span> Mutación en <span class='audit-path'>${JSON.stringify(action.path)}</span><br>❌ <strong>Antes:</strong> <span class='removed'>${JSON.stringify(valorAntiguo)}</span><br>👉 <strong>Ahora:</strong> <span class='changed'>${JSON.stringify(decision.value)}</span></div>`);
                                }
                            }
                            break;

                        case "memory":
                            if (action.charId && Array.isArray(action.texts)) {
                                const personaje = baseRoot.chars ? baseRoot.chars[action.charId] : null;
                                const nombrePersonaje = personaje ? (personaje.nick || action.charId) : action.charId;

                                if (personaje) {
                                    if (!Array.isArray(personaje.memories)) {
                                        personaje.memories = [];
                                    }

                                    // --- CAMBIO AQUÍ: Le avisamos al evaluador que es un "MemoryAdd" legítimo ---
                                    const decisionMemory = evaluarYRegistrarCambio(baseRoot, ["chars", action.charId, "memories"], action.texts, "aiActions(MemoryAdd)", logs);
                                    if (!decisionMemory.aprobado) break;

                                    let bloquesRecuerdos = action.texts.map(txt => `<li>🧠 <em>"${escapeHtml(txt)}"</em></li>`).join("");
                                    const detalleMemorias = `
                <div style="margin-top: 6px; border-left: 3px solid #b388ff; padding-left: 10px; background: rgba(179, 136, 255, 0.05); padding-top: 4px; padding-bottom: 4px;">
                    <span style="font-size: 12px; color: #b388ff; font-weight: bold; display: block; margin-bottom: 2px;">NUEVOS RECUERDOS CONSOLIDADOS:</span>
                    <ul style="margin: 0; padding-left: 20px; font-size: 13px; color: #d1c4e9; line-height: 1.4;">
                        ${bloquesRecuerdos}
                    </ul>
                </div>
            `;

                                    action.texts.forEach(txt => personaje.memories.push(txt));

                                    logs.push(`
                <div class='log-entry'>
                    ${paso} <span class='changed audit-op' style='background: #b388ff; color: #111;'>[MEMORY]</span> Registro de experiencia para <strong>"${nombrePersonaje}"</strong>.
                    ${detalleMemorias}
                </div>
            `);
                                } else {
                                    logs.push(`<div class='log-entry' style='color:#ff6188;'>${paso} ⚠️ Intentó añadir recuerdos a "${action.charId}" pero el personaje no existe.</div>`);
                                }
                            }
                            break;

                    case 'editRadar':
                        // Asegurar que la estructura base exista en el JSON maestro
                        if (!baseRoot.additionalIdsToSeeInfoForAI) {
                            baseRoot.additionalIdsToSeeInfoForAI = { chars: [], worldStorage: [] };
                        }
                        if (!baseRoot.additionalIdsToSeeInfoForAI.chars) baseRoot.additionalIdsToSeeInfoForAI.chars = [];
                        if (!baseRoot.additionalIdsToSeeInfoForAI.worldStorage) baseRoot.additionalIdsToSeeInfoForAI.worldStorage = [];

                        // 1. Añadir personajes al radar extendido
                        if (action.addChars && Array.isArray(action.addChars)) {
                            action.addChars.forEach(id => {
                                const limpio = String(id).trim();
                                if (limpio && !baseRoot.additionalIdsToSeeInfoForAI.chars.includes(limpio)) {
                                    baseRoot.additionalIdsToSeeInfoForAI.chars.push(limpio);
                                    logs.push(`<div class='log-entry' style='color:#b388ff;'>👁️ Radar: Añadido personaje "${limpio}" al canal de espionaje.</div>`);
                                }
                            });
                        }
                        // 2. Añadir subÁreas al radar extendido
                        if (action.addWorld && Array.isArray(action.addWorld)) {
                            action.addWorld.forEach(id => {
                                const limpio = String(id).trim();
                                if (limpio && !baseRoot.additionalIdsToSeeInfoForAI.worldStorage.includes(limpio)) {
                                    baseRoot.additionalIdsToSeeInfoForAI.worldStorage.push(limpio);
                                    logs.push(`<div class='log-entry' style='color:#b388ff;'>👁️ Radar: Añadida subÁrea "${limpio}" al canal de espionaje.</div>`);
                                }
                            });
                        }
                        // 3. Remover personajes del radar extendido
                        if (action.removeChars && Array.isArray(action.removeChars)) {
                            action.removeChars.forEach(id => {
                                const limpio = String(id).trim();
                                const idx = baseRoot.additionalIdsToSeeInfoForAI.chars.indexOf(limpio);
                                if (idx !== -1) {
                                    baseRoot.additionalIdsToSeeInfoForAI.chars.splice(idx, 1);
                                    logs.push(`<div class='log-entry' style='color:#ff6188;'>👁️ Radar: Removido personaje "${limpio}" del canal de espionaje.</div>`);
                                }
                            });
                        }
                        // 4. Remover subÁreas del radar extendido
                        if (action.removeWorld && Array.isArray(action.removeWorld)) {
                            action.removeWorld.forEach(id => {
                                const limpio = String(id).trim();
                                const idx = baseRoot.additionalIdsToSeeInfoForAI.worldStorage.indexOf(limpio);
                                if (idx !== -1) {
                                    baseRoot.additionalIdsToSeeInfoForAI.worldStorage.splice(idx, 1);
                                    logs.push(`<div class='log-entry' style='color:#ff6188;'>👁️ Radar: Removida subÁrea "${limpio}" del canal de espionaje.</div>`);
                                }
                            });
                        }
                        break;
                    }
                });
            }
            // =================================================================
            // 🔥 NUEVO: CONSOLIDACIÓN DE IMPLICADOS (JUGADOR + MANIPULADOS)
            // =================================================================
            if (window.personajesManipulados) {
                window.personajesManipulados.forEach(id => implicadosEnTurno.add(id));
            }
            window.lastTurnImplicatedChars = Array.from(implicadosEnTurno);
        }

        function findAndExtractObjId(currentArea, targetId) {
            if (!currentArea || typeof currentArea !== 'object') return null;
            if (Array.isArray(currentArea)) {
                for (let i = 0; i < currentArea.length; i++) {
                    if (currentArea[i] && currentArea[i].idObj === targetId) return currentArea.splice(i, 1)[0];
                }
            }
            for (let key in currentArea) {
                if (currentArea.hasOwnProperty(key) && typeof currentArea[key] === 'object') {
                    const found = findAndExtractObjId(currentArea[key], targetId); if (found) return found;
                }
            }
            return null;
        }

        function getValueByPath(root, pathArr) {
            return pathArr.reduce((acc, key) => (acc && acc[key] !== undefined) ? acc[key] : null, root);
        }

        function setValueByPath(root, pathArr, value) {
            if (!pathArr.length) return false;
            let current = root;
            for (let i = 0; i < pathArr.length - 1; i++) {
                let key = pathArr[i]; if (current[key] === undefined) return false; current = current[key];
            }
            current[pathArr[pathArr.length - 1]] = value; return true;
        }

        function deleteByPath(root, pathArr) {
            if (!pathArr.length) return false;
            let current = root;
            for (let i = 0; i < pathArr.length - 1; i++) {
                let key = pathArr[i]; if (current[key] === undefined) return false; current = current[key];
            }
            let finalKey = pathArr[pathArr.length - 1];
            if (Array.isArray(current)) current.splice(Number(finalKey), 1); else delete current[finalKey];
            return true;
        }

        function enviarAlLimbo(baseRoot, item) {
            const arrayLimboFinal = asegurarEstructuraLimbo(baseRoot);
            const existeYa = arrayLimboFinal.some(it => it && it.idObj === item.idObj);
            if (!existeYa) {
                item.inLimbo = true;
                if (!item.last_seen) item.last_seen = { type: "subArea", id: "Gensokyo" };
                arrayLimboFinal.push(item);
            }
        }

        function deepMerge(target, source, path = '', logs = [], baseRootRef = null) {
            if (!source || typeof source !== 'object') return;
            const root = baseRootRef || target;
            const baseRootSystem = baseRootRef || target;

            for (const key in source) {
                if (source.hasOwnProperty(key)) {
                    let logPathPrefix = (path === '' && root !== target) ? 'dynamicData' : path;
                    const currentPath = logPathPrefix ? `${logPathPrefix}.${key}` : key;
                    const arrayRutaActual = currentPath.split('.');

                    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
                        if (!target[key] || typeof target[key] !== 'object' || Array.isArray(target[key])) target[key] = {};
                        deepMerge(target[key], source[key], currentPath, logs, root);
                    } else {
                        if (target[key] !== undefined) {
                            if (JSON.stringify(target[key]) !== JSON.stringify(source[key])) {
                                const decisionDM = evaluarYRegistrarCambio(baseRootSystem, arrayRutaActual, source[key], "DeepMerge", logs);
                                if (!decisionDM.aprobado) continue;

                                if (Array.isArray(target[key])) {
                                    const idsDestruidos = extraerIdsHijas(target[key]);
                                    if (idsDestruidos.length > 0) {
                                        const ws = getDynamicRoot(root).worldState || {};
                                        if (!ws.reusableObjIds) ws.reusableObjIds = [];
                                        idsDestruidos.forEach(id => { if (!ws.reusableObjIds.includes(id)) ws.reusableObjIds.push(id); });
                                        ws.reusableObjIds.sort((a, b) => a - b);
                                    }
                                }
                                logs.push(`<div class='log-entry'><strong>[DeepMerge]</strong> Mutación en <span class='audit-path'>"${currentPath}"</span><br>❌ <strong>Antes:</strong> <span class='removed'>${JSON.stringify(target[key])}</span><br>👉 <strong>Ahora:</strong> <span class='changed'>${JSON.stringify(decisionDM.value)}</span></div>`);
                                target[key] = JSON.parse(JSON.stringify(decisionDM.value));
                            }
                        } else {
                            const decisionDM = evaluarYRegistrarCambio(baseRootSystem, arrayRutaActual, source[key], "DeepMerge", logs);
                            if (!decisionDM.aprobado) continue;
                            logs.push(`<div class='log-entry'><strong>[DeepMerge]</strong> Inyección residual <span class='audit-path'>"${currentPath}"</span></div>`);
                            target[key] = JSON.parse(JSON.stringify(decisionDM.value));
                        }
                    }
                }
            }
        }

        function ejecutarSincronizacionProcesada() {
            const txtBase = document.getElementById('jsonBase').value.trim();
            const txtUpdate = document.getElementById('jsonUpdate').value.trim();
            const elLogs = document.getElementById('logsSincronizacion');

            if (!txtBase || !txtUpdate) return;

            try {
                let baseObj = JSON.parse(txtBase);
                let updateObj = JSON.parse(txtUpdate);
                let listaLogs = [];
                isSystemValid = false;

                // =================================================================
                // 🔥 NUEVO: RASTREADOR DE PERSONAJES MANIPULADOS EN EL TURNO
                // =================================================================
                window.personajesManipulados = new Set();

                // DETECTOR DE IDS DUPLICADAS EN EL JSON MAESTRO (BASE)
                const idsDuplicadasDetectadas = verificarIdsDuplicadas(baseObj);

                if (idsDuplicadasDetectadas.size > 0) {
                    const listaIds = Array.from(idsDuplicadasDetectadas).join(', ');
                    listaLogs.push(`
                <div class="conflict-row loss-alarm" style="border: 2px dashed #ff1744; background: rgba(255, 23, 68, 0.15); margin-bottom: 15px;">
                    ☢️ <strong>[ALERTA CRÍTICA DE BASE DE DATOS]</strong><br>
                    ¡Se han detectado IDs de objetos duplicadas en el JSON Maestro!<br>
                    ⚠️ <strong>IDs Afectadas:</strong> <code style="background:#111; color:#ff1744; padding:2px 6px;">[ ${listaIds} ]</code><br>
                    <span style="font-size:12px; color:#aaa;">Nota: Las operaciones Quirúrgicas de movimiento (move), borrado (delete) o edición (editObj) pueden actuar sobre el objeto equivocado debido a este conflicto de identidad. Se recomienda reparar las IDs manualmente.</span>
                </div>
            `);
                }

                // Continúa tu código normal de sincronización...
                listaLogs.push("<div style='color:#00d2ff; font-weight:bold; border-bottom:1px solid #444; padding-bottom:4px;'>Fase 1: Comandos Quirúrgicos 'aiActions'</div>");
                processAiActions(baseObj, updateObj, listaLogs);

                if (updateObj.aiActions) delete updateObj.aiActions;
                if (updateObj.dynamicData && updateObj.dynamicData.aiActions) delete updateObj.dynamicData.aiActions;

                listaLogs.push("<br><div style='color:#00d2ff; font-weight:bold; border-bottom:1px solid #444; padding-bottom:4px;'>Fase 2: Comparación Estructural Residual (Deep Merge)</div>");
                let mergeTarget = baseObj;
                if (baseObj.dynamicData && !updateObj.dynamicData) mergeTarget = baseObj.dynamicData;

                deepMerge(mergeTarget, updateObj, '', listaLogs, baseObj);

                // =================================================================
                // FASE 3: ESCÁNER DE SANACIÓN FORENSE (DETECTA IN-LIMBO CORREGIDO)
                // =================================================================
                listaLogs.push("<br><div style='color:#9b59b6; font-weight:bold; border-bottom:1px solid #444; padding-bottom:4px;'>Fase 3: Sanación y Destierro Inteligente al Limbo</div>");
                let baseRootRef = getDynamicRoot(baseObj);
                escanearYDesterrarAlLimbo(baseRootRef, [], baseRootRef, listaLogs);

                // --- ANCLA DE SEGURIDAD ABSOLUTA ---
                // Nos aseguramos de que bajo ninguna circunstancia se haya corrompido la plantilla

                if (baseRootRef.aiActions) {
                    baseRootRef.aiActions.why = "Brief narrative justification of the actions taken during the turn.";
                    baseRootRef.aiActions.sequence = [
                        {
                            "op": "string (edit | editObj | create | move | delete | memory | editRadar)",
                            "targetId": "numeric (required for 'editObj', alternative for 'delete' or 'move' to target items directly by their idObj)",
                            "updates": "object (required ONLY for 'editObj', e.g., {\"q\": 2, \"det\": \"Equipped\"})",
                            "path": ["array", "of", "strings/numbers", "for", "generic", "target", "path"],
                            "value": "any (required ONLY for generic 'edit' operation)",
                            "to": ["array", "for", "destination", "path"],
                            "key": "string (optional, dictionary key for 'create' operation)",
                            "isObj": "boolean (optional, if true autogenerates incremental idObj)",
                            "data": "object (required ONLY for 'create' operation)",
                            "charId": "string (required ONLY for 'memory' operation)",
                            "texts": ["array", "of", "strings", "for", "new", "memories"],
                            "addChars": ["array", "of", "strings", "IDs", "of", "NPCs", "to", "spy"],
                            "addWorld": ["array", "of", "strings", "IDs", "of", "subAreas", "to", "spy"],
                            "removeChars": ["array", "of", "strings", "IDs", "to", "stop", "spying"],
                            "removeWorld": ["array", "of", "strings", "IDs", "to", "stop", "spying"]
                        }
                    ];
                    baseRootRef.aiActions.note_sequence = "CRITICAL: Use 'targetId' and 'editObj' instead of item array indexes in 'path' to avoid index shift bugs when deleting or modifying items.";
                }

                document.getElementById('resultado').textContent = JSON.stringify(baseObj, null, 4);
                elLogs.innerHTML = listaLogs.join('');
                isSystemValid = true;
                actualizarPanelAccionesRapidas(baseObj, window.lastTurnImplicatedChars || []);

            } catch (error) {
                console.error(error);
                isSystemValid = false;
                elLogs.innerHTML = `<div style="color:#ff6188; padding:8px;"><strong>Error crítico:</strong> ${error.message}</div>`;
            }
        }

        function copiarResultado() {
            if (!isSystemValid) return alert("Ejecuta la sincronización primero.");
            navigator.clipboard.writeText(document.getElementById('resultado').textContent)
                .then(() => alert("Copiado al portapapeles."))
                .catch(err => alert("Error: " + err));
        }

        function exportarArchivo() {
            if (!isSystemValid) return alert("Ejecuta la sincronización primero.");
            try {
                const finalContent = document.getElementById('resultado').textContent;
                const finalData = JSON.parse(finalContent);
                const dynamic = getDynamicRoot(finalData);
                let fileName = "ESync_Resultado.json";
                if (dynamic && dynamic.worldState && dynamic.chars) {
                    const playerId = dynamic.worldState.turnActionPlayer_id || "Gensokyo";
                    const currentArea = dynamic.chars[playerId] ?.currentArea_id || "AreaDesconocida";
                    const day = dynamic.worldState.time ?.day || "0";
                    const hour = (dynamic.worldState.time ?.h || "00-00").replace(':', 'M');
                    fileName = `ESync_${String(playerId)}_${currentArea}_D${day}_H${hour}.json`;
                }
                const blob = new Blob([finalContent], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a"); a.href = url; a.download = fileName; a.click(); URL.revokeObjectURL(url);
            } catch (err) { alert("Error: " + err.message); }
        }

        function limpiarTodo() {
            if (confirm("¿Limpiar todo?")) {
                document.getElementById('jsonBase').value = ""; document.getElementById('jsonUpdate').value = "";
                document.getElementById('resultado').textContent = "{}"; document.getElementById('logsSincronizacion').innerHTML = "Esperando...";
                document.getElementById('zonaAccionesRapidas').style.display = 'none'; mapaConflictos.clear(); isSystemValid = false;
            }
        }

        function actualizarPanelAccionesRapidas(data, filtrarPorIds) {
            const contenedor = document.getElementById('zonaAccionesRapidas');
            const listaBotones = document.getElementById('listaBotonesChars');
            listaBotones.innerHTML = '';
            const root = getDynamicRoot(data);
            if (root && root.chars) {
                let personajesAMostrar = Object.keys(root.chars).filter(charId => charId !== 'id_tplMANDATORY');
                if (filtrarPorIds && filtrarPorIds.length > 0) personajesAMostrar = personajesAMostrar.filter(charId => filtrarPorIds.includes(charId));

                if (personajesAMostrar.length > 0) {
                    contenedor.style.display = 'block';
                    personajesAMostrar.forEach(charId => {
                        const btn = document.createElement('button');
                        btn.style.margin = '5px'; btn.style.background = '#00d2ff'; btn.style.color = '#111'; btn.style.flex = 'initial'; btn.style.padding = '8px 16px';
                        btn.textContent = `Editar Memorias: ${root.chars[charId].nick || charId}`;
                        btn.onclick = () => abrirEditorMemorias(charId);
                        listaBotones.appendChild(btn);
                    });
                } else { contenedor.style.display = 'none'; }
            }
        }

        function abrirEditorMemorias(charId) {
            const finalData = JSON.parse(document.getElementById('resultado').textContent);
            const root = getDynamicRoot(finalData); if (!root || !root.chars || !root.chars[charId]) return;
            const personaje = root.chars[charId];
            document.getElementById('modalTitulo').textContent = `Memorias de ${personaje.nick || charId}`;
            const contenedor = document.getElementById('contenidoMemorias'); contenedor.innerHTML = '';
            const memorias = personaje.memories || [];

            if (memorias.length === 0) {
                contenedor.innerHTML = '<p style="color:#aaa; font-style:italic;">Sin recuerdos.</p>';
            } else {
                memorias.forEach((mem, index) => {
                    const item = document.createElement('div'); item.className = 'memoria-item';
                    item.innerHTML = `
                        <input type="text" value="${mem.replace(/"/g, '&quot;')}" onchange="editarMemoria('${charId}', ${index}, this.value)">
                        <button onclick="eliminarMemoria('${charId}', ${index})" style="background:#ff4757; padding:4px 8px; font-size:12px; flex:none; width:auto;">X</button>
                    `;
                    contenedor.appendChild(item);
                });
            }
            document.getElementById('btnAnadirMemoria').onclick = () => {
                const txt = document.getElementById('nuevoRecuerdoTxt').value.trim();
                if (txt) { anadirMemoria(charId, txt); document.getElementById('nuevoRecuerdoTxt').value = ''; }
            };
            document.getElementById('modalOverlay').style.display = 'block'; document.getElementById('modalMemorias').style.display = 'block';
        }

        window.cerrarModal = function () {
            document.getElementById('modalOverlay').style.display = 'none'; document.getElementById('modalMemorias').style.display = 'none';
        }

        function anadirMemoria(charId, texto) {
            const elResultado = document.getElementById('resultado'); const finalData = JSON.parse(elResultado.textContent);
            let root = getDynamicRoot(finalData); if (!root.chars[charId].memories) root.chars[charId].memories = [];
            root.chars[charId].memories.push(texto); elResultado.textContent = JSON.stringify(finalData, null, 4); abrirEditorMemorias(charId);
        }

        function editarMemoria(charId, index, nuevoTexto) {
            const elResultado = document.getElementById('resultado'); const finalData = JSON.parse(elResultado.textContent);
            let root = getDynamicRoot(finalData); root.chars[charId].memories[index] = nuevoTexto; elResultado.textContent = JSON.stringify(finalData, null, 4);
        }

        function eliminarMemoria(charId, index) {
            if (!confirm("¿Eliminar recuerdo?")) return;
            const elResultado = document.getElementById('resultado'); const finalData = JSON.parse(elResultado.textContent);
            let root = getDynamicRoot(finalData); root.chars[charId].memories.splice(index, 1); elResultado.textContent = JSON.stringify(finalData, null, 4); abrirEditorMemorias(charId);
        }

        function verificarIdsDuplicadas(nodo, mapaIds = new Set(), duplicadas = new Set()) {
            if (!nodo || typeof nodo !== 'object') return duplicadas;
            if (nodo.hasOwnProperty('idObj') && typeof nodo.idObj === 'number') {
                if (mapaIds.has(nodo.idObj)) {
                    duplicadas.add(nodo.idObj);
                } else {
                    mapaIds.add(nodo.idObj);
                }
            }
            for (let clave in nodo) {
                if (nodo.hasOwnProperty(clave) && typeof nodo[clave] === 'object') {
                    verificarIdsDuplicadas(nodo[clave], mapaIds, duplicadas);
                }
            }
            return duplicadas;
        }

        // ==========================================
        // NUEVA LÓGICA PARA ENCONTRAR LA RUTA REAL DE UN ID ANTES DE OPERAR
        // ==========================================
        function encontrarRutaYPadrePorId(nodo, targetId, rutaActual = []) {
            if (!nodo || typeof nodo !== 'object') return null;

            // Si es un array, buscamos si uno de sus hijos directos tiene la ID
            if (Array.isArray(nodo)) {
                for (let i = 0; i < nodo.length; i++) {
                    if (nodo[i] && nodo[i].idObj === targetId) {
                        return { padre: nodo, clave: i, objeto: nodo[i], ruta: [...rutaActual, i] };
                    }
                    // Búsqueda recursiva profunda dentro del elemento del array (por ejemplo, si es una mochila)
                    let resultado = encontrarRutaYPadrePorId(nodo[i], targetId, [...rutaActual, i]);
                    if (resultado) return resultado;
                }
            } else {
                // Si es un objeto, buscamos en sus propiedades
                for (let llave in nodo) {
                    if (nodo.hasOwnProperty(llave) && typeof nodo[llave] === 'object') {
                        let resultado = encontrarRutaYPadrePorId(nodo[llave], targetId, [...rutaActual, llave]);
                        if (resultado) return resultado;
                    }
                }
            }
            return null;
        }
        function escapeHtml(text) {
            if (typeof text !== 'string') return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function existeUbicacionEnMapa(nodo, targetKey) {
            if (!nodo || typeof nodo !== 'object') return false;
            // Si encontramos la clave directamente en el diccionario de subáreas o almacenamiento
            if (nodo.hasOwnProperty(targetKey)) return true;

            for (let k in nodo) {
                if (nodo.hasOwnProperty(k) && typeof nodo[k] === 'object') {
                    if (existeUbicacionEnMapa(nodo[k], targetKey)) return true;
                }
            }
            return false;
        }
    </script>
